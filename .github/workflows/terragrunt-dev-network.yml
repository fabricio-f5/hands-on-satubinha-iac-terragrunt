# .github/workflows/terragrunt-dev-network.yml
# ------------------------------------------------------------
# Layer 1 — Network do ambiente dev.
# VPC, Subnet, IGW, Route Table, Security Group.
#
# Trigger: APENAS manual via workflow_dispatch.
# Infra de rede é de longa duração — nunca deve ser alterada
# automaticamente por um push de código.
# ------------------------------------------------------------
name: "[Dev] Network"
on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Acção a executar'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - plan_destroy
          - destroy

jobs:
  network:
    name: "Dev — Network (${{ github.event.inputs.action }})"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: dev-network
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: Setup Terragrunt
        run: |
          curl -Lo terragrunt https://github.com/gruntwork-io/terragrunt/releases/download/v0.67.0/terragrunt_linux_amd64
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/
          terragrunt --version

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: GitHubActions-${{ github.run_id }}

      # ------------------------------------------------------------
      # Qualidade de código — corre sempre, independente da acção
      # ------------------------------------------------------------
      - name: Terraform Format Check
        working-directory: environments/dev/network
        run: terraform fmt -check
        # -check não modifica ficheiros — falha se houver diferenças

      - name: Terragrunt Validate
        working-directory: environments/dev/network
        run: terragrunt --terragrunt-non-interactive validate

      - name: Checkov Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: environments/dev/network
          framework: terraform
          config_file: ${{ github.workspace }}/.checkov.yaml
          soft_fail: true
          output_format: cli
          output_file_path: checkov-report.txt
          download_external_modules: false

      - name: Upload Checkov report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-report-dev-network-${{ github.run_id }}
          path: checkov-report.txt
          retention-days: 30

      # ------------------------------------------------------------
      # Plan — corre quando action == plan ou apply
      # Não corre em plan_destroy nem destroy
      # ------------------------------------------------------------
      - name: Terragrunt Plan
        if: ${{ github.event.inputs.action == 'plan' || github.event.inputs.action == 'apply' }}
        working-directory: environments/dev/network
        run: terragrunt --terragrunt-non-interactive plan -out=tfplan

      # ------------------------------------------------------------
      # Apply
      # ------------------------------------------------------------
      - name: Terragrunt Apply
        if: ${{ github.event.inputs.action == 'apply' }}
        working-directory: environments/dev/network
        run: |
          echo "Aplicando network do dev..."
          terragrunt --terragrunt-non-interactive apply -auto-approve tfplan

      - name: Terragrunt Output
        if: ${{ github.event.inputs.action == 'apply' }}
        working-directory: environments/dev/network
        run: terragrunt --terragrunt-non-interactive output -json

      # ------------------------------------------------------------
      # Plan Destroy — mostra o que seria destruído, sem destruir
      # ------------------------------------------------------------
      - name: Terragrunt Plan Destroy
        if: ${{ github.event.inputs.action == 'plan_destroy' }}
        working-directory: environments/dev/network
        run: |
          echo "Calculando impacto do destroy — nenhum recurso será removido..."
          terragrunt --terragrunt-non-interactive plan -destroy -out=tfplan_destroy
          terragrunt --terragrunt-non-interactive show -no-color tfplan_destroy

      # ------------------------------------------------------------
      # Destroy — protecção contra acidente
      # Só executa se action for explicitamente 'destroy'
      # ------------------------------------------------------------
      - name: Confirm Destroy Intent
        if: ${{ github.event.inputs.action == 'destroy' }}
        run: |
          echo "⚠️  DESTROY solicitado por: ${{ github.actor }}"
          echo "⚠️  Ambiente: dev — Network"
          echo "⚠️  Commit: ${{ github.sha }}"
          echo "Recursos de rede serão permanentemente removidos."

      - name: Terragrunt Destroy
        if: ${{ github.event.inputs.action == 'destroy' }}
        working-directory: environments/dev/network
        run: |
          terragrunt --terragrunt-non-interactive destroy -auto-approve
