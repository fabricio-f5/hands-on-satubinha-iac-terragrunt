# .github/workflows/terragrunt-staging-ec2.yml
# ------------------------------------------------------------
# Layer 2 — EC2 do ambiente staging.
#
# Staging não tem auto-apply — push abre plan para revisão.
# Apply sempre manual e deliberado.
# ------------------------------------------------------------
name: "[Staging] EC2"
on:
  push:
    branches:
      - main
    paths:
      - 'environments/staging/ec2/**'
      - 'modules/aws-ec2-instance/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Acção a executar'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - plan_destroy
          - destroy

jobs:
  ec2:
    name: "Staging — EC2 (${{ github.event_name == 'push' && 'plan-only' || github.event.inputs.action }})"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: staging-ec2
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: Setup Terragrunt
        run: |
          curl -Lo terragrunt https://github.com/gruntwork-io/terragrunt/releases/download/v0.67.0/terragrunt_linux_amd64
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: GitHubActions-${{ github.run_id }}

      - name: Terraform Format Check
        working-directory: environments/staging/ec2
        run: terraform fmt -check

      - name: Terragrunt Validate
        working-directory: environments/staging/ec2
        run: terragrunt --terragrunt-non-interactive validate

      - name: Checkov Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: environments/staging/ec2
          framework: terraform
          config_file: ${{ github.workspace }}/.checkov.yaml
          soft_fail: true
          output_format: cli
          output_file_path: checkov-report.txt
          download_external_modules: false

      - name: Upload Checkov report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-report-staging-ec2-${{ github.run_id }}
          path: checkov-report.txt
          retention-days: 30

      # Push para main — só plan, sem apply
      - name: Terragrunt Plan (push — review only)
        if: ${{ github.event_name == 'push' }}
        working-directory: environments/staging/ec2
        run: |
          echo "Push detectado — apenas plan. Apply requer workflow_dispatch manual."
          terragrunt --terragrunt-non-interactive plan

      - name: Terragrunt Plan (manual)
        if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.action == 'plan' || github.event.inputs.action == 'apply') }}
        working-directory: environments/staging/ec2
        run: terragrunt --terragrunt-non-interactive plan -out=tfplan

      - name: Terragrunt Apply
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' }}
        working-directory: environments/staging/ec2
        run: |
          echo "Aplicando EC2 do staging..."
          terragrunt --terragrunt-non-interactive apply -auto-approve tfplan

      - name: Terragrunt Output
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' }}
        working-directory: environments/staging/ec2
        run: terragrunt --terragrunt-non-interactive output -json

      - name: Terragrunt Plan Destroy
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'plan_destroy' }}
        working-directory: environments/staging/ec2
        run: |
          echo "Calculando impacto do destroy — nenhum recurso será removido..."
          terragrunt --terragrunt-non-interactive plan -destroy -out=tfplan_destroy
          terragrunt --terragrunt-non-interactive show -no-color tfplan_destroy

      - name: Confirm Destroy Intent
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy' }}
        run: |
          echo "⚠️  DESTROY solicitado por: ${{ github.actor }}"
          echo "⚠️  Ambiente: staging — EC2"
          echo "⚠️  Commit: ${{ github.sha }}"

      - name: Terragrunt Destroy
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy' }}
        working-directory: environments/staging/ec2
        run: terragrunt --terragrunt-non-interactive destroy -auto-approve
