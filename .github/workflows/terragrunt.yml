# .github/workflows/terragrunt.yml
# ------------------------------------------------------------
# Pipeline Terragrunt — plan em PRs, apply no merge para main.
# Autenticação via OIDC — sem credenciais estáticas.
# ------------------------------------------------------------

name: Terragrunt CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write   # necessário para OIDC
  contents: read
  pull-requests: write

env:
  TF_VERSION:  "1.9.8"
  TG_VERSION:  "0.67.0"
  AWS_REGION:  "us-east-1"

jobs:
  terragrunt:
    name: "${{ matrix.environment }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, staging, prod]
      fail-fast: false   # continua os outros ambientes se um falhar

    defaults:
      run:
        working-directory: environments/${{ matrix.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup Terragrunt
        run: |
          curl -Lo terragrunt https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TG_VERSION }}/terragrunt_linux_amd64
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/
          terragrunt --version

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terragrunt Init
        run: terragrunt init -reconfigure

      - name: Terragrunt Plan
        run: terragrunt plan -out=tfplan.binary
        if: github.event_name == 'pull_request'

      - name: Terragrunt Apply
        run: terragrunt apply -auto-approve
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
